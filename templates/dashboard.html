<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/shared.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <style>
        .page-wrapper { max-width: 1100px; margin: 80px auto 40px; padding: 0 16px; }

        /* GPU card */
        .gpu-card { border-radius: 10px; background: #fff; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
        .gpu-name { font-weight: 700; font-size: 1rem; margin-bottom: 12px; }
        .gpu-stat  { font-size: .85rem; color: #555; margin-bottom: 4px; }
        .progress  { height: 8px; border-radius: 4px; margin-bottom: 12px; }

        /* Queue badges */
        .queue-pill {
            display: inline-block; border-radius: 20px; padding: 8px 22px;
            font-weight: 600; font-size: .9rem; margin-right: 10px;
        }
        .queue-high   { background: var(--danger);  color: #fff; }
        .queue-medium { background: var(--warning); color: #212529; }
        .queue-low    { background: var(--success); color: #fff; }

        .log-pre { background: #1e1e1e; color: #d4d4d4; border-radius: 6px;
                   font-size: .75rem; padding: 12px; max-height: 300px; overflow-y: auto;
                   white-space: pre-wrap; word-break: break-word; }

        .refresh-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
                       background: var(--success); margin-right: 6px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

        /* Logs modal */
        .modal-logs .modal-body { padding: 12px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <a class="navbar-brand" href="/">ML Orchestrator</a>
    <div class="navbar-nav ml-auto">
        <a class="nav-item nav-link" href="/">Preprocessing</a>
        <a class="nav-item nav-link" href="/train">Submit Job</a>
        <a class="nav-item nav-link active" href="/dashboard">Dashboard</a>
    </div>
</nav>

<div class="page-wrapper">

    <!-- Header -->
    <div class="d-flex align-items-center mb-3">
        <h3 class="font-weight-bold mb-0">Dashboard</h3>
        <span class="ml-3 text-muted" style="font-size:.85rem;">
            <span class="refresh-dot"></span>Auto-refresh every 3s
        </span>
        <span class="ml-auto text-muted" style="font-size:.8rem;" id="lastUpdated"></span>
    </div>

    <!-- GPU Resources -->
    <h6 class="text-uppercase text-muted font-weight-bold mb-2" style="letter-spacing:.08em;">GPU Resources</h6>
    <div id="gpuPanel" class="row mb-4"></div>

    <!-- Queue Status -->
    <h6 class="text-uppercase text-muted font-weight-bold mb-2" style="letter-spacing:.08em;">Queue Status</h6>
    <div class="mb-4">
        <span class="queue-pill queue-high">High: <span id="qHigh">-</span></span>
        <span class="queue-pill queue-medium">Medium: <span id="qMedium">-</span></span>
        <span class="queue-pill queue-low">Low: <span id="qLow">-</span></span>
    </div>

    <!-- Job List -->
    <h6 class="text-uppercase text-muted font-weight-bold mb-2" style="letter-spacing:.08em;">Training Jobs</h6>
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="thead-light">
                    <tr>
                        <th>Job ID</th>
                        <th>Status</th>
                        <th>Model</th>
                        <th>Epochs</th>
                        <th>Priority</th>
                        <th>Submitted</th>
                        <th>GPU</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="jobTableBody">
                    <tr><td colspan="8" class="text-center text-muted py-4">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Logs Modal -->
<div class="modal fade modal-logs" id="logsModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header py-2">
                <h6 class="modal-title mb-0">Logs — <code id="logsJobId"></code></h6>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <pre class="log-pre" id="logsContent">Loading...</pre>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
<script src="/static/dashboard.js"></script>
</body>
</html>
